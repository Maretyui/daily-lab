<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>003 — Scramble Text</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0e14;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #14b8a6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
  }

  a.back {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
  }
  a.back:hover { color: var(--accent); }

  .targets {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
  }

  .scramble {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .scramble:hover {
    color: var(--accent);
  }

  p.caption {
    max-width: 340px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <a class="back" href="../../index.html">&larr; daily-lab</a>

  <div class="targets">
    <span class="scramble" data-text="decrypt me">decrypt me</span>
    <span class="scramble" data-text="hover again">hover again</span>
  </div>

  <p class="caption">
    Hovering swaps each character through random glyphs before it settles back
    into place, left to right, like an old terminal decrypt animation. No
    canvas, just a ticking <code>setInterval</code> over the string.
  </p>

  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*_+-=/<>?';
    const STEP_MS = 30;
    const REVEAL_EVERY = 3;

    function scramble(el) {
      const target = el.dataset.text;
      let frame = 0;
      clearInterval(el._timer);

      el._timer = setInterval(() => {
        el.textContent = target
          .split('')
          .map((char, i) => {
            if (char === ' ') return ' ';
            const revealedAt = i * REVEAL_EVERY;
            if (frame >= revealedAt) return target[i];
            return CHARS[Math.floor(Math.random() * CHARS.length)];
          })
          .join('');

        frame++;
        if (frame > target.length * REVEAL_EVERY) {
          clearInterval(el._timer);
          el.textContent = target;
        }
      }, STEP_MS);
    }

    document.querySelectorAll('.scramble').forEach((el) => {
      el.addEventListener('mouseenter', () => scramble(el));
    });
  </script>
</body>
</html>
