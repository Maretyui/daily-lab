<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>001 — Glass Tilt Card</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0e14;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #14b8a6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
  }

  a.back {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
  }
  a.back:hover { color: var(--accent); }

  .stage {
    perspective: 900px;
  }

  .card {
    position: relative;
    width: 280px;
    height: 180px;
    border-radius: 16px;
    background: linear-gradient(155deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(6px);
    transform-style: preserve-3d;
    transition: transform 0.12s ease-out, box-shadow 0.12s ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(20, 184, 166, 0.35), transparent 55%);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .card:hover::before { opacity: 1; }

  .card span {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  p.caption {
    max-width: 320px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <a class="back" href="../../index.html">&larr; daily-lab</a>

  <div class="stage">
    <div class="card" id="card">
      <span>hover / tilt me</span>
    </div>
  </div>

  <p class="caption">
    Pure CSS + ~15 lines of vanilla JS: the card rotates toward the cursor
    with a perspective transform, and a radial gradient tracks the pointer
    to fake a specular highlight on the glass. No libraries.
  </p>

  <script>
    const card = document.getElementById('card');
    const MAX_TILT = 10;

    card.addEventListener('pointermove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;

      const rotateY = (x - 0.5) * MAX_TILT * 2;
      const rotateX = (0.5 - y) * MAX_TILT * 2;

      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
      card.style.setProperty('--mx', `${x * 100}%`);
      card.style.setProperty('--my', `${y * 100}%`);
    });

    card.addEventListener('pointerleave', () => {
      card.style.transform = 'rotateX(0) rotateY(0) scale(1)';
    });
  </script>
</body>
</html>
